<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
  </defs>
  <!-- 背景圆 -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" stroke="#e94560" stroke-width="8"/>
  <!-- 罗盘外圈 -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#e94560" stroke-width="3" opacity="0.6"/>
  <!-- 罗盘刻度 -->
  <line x1="256" y1="56" x2="256" y2="80" stroke="#e94560" stroke-width="4"/>
  <line x1="256" y1="432" x2="256" y2="456" stroke="#e94560" stroke-width="4"/>
  <line x1="56" y1="256" x2="80" y2="256" stroke="#e94560" stroke-width="4"/>
  <line x1="432" y1="256" x2="456" y2="256" stroke="#e94560" stroke-width="4"/>
  <!-- 指针 - 北 -->
  <polygon points="256,80 280,256 256,280 232,256" fill="#e94560"/>
  <!-- 指针 - 南 -->
  <polygon points="256,432 280,256 256,232 232,256" fill="#0f3460"/>
  <!-- 指针 - 东 -->
  <polygon points="432,256 256,280 232,256 256,232" fill="#0f3460"/>
  <!-- 指针 - 西 -->
  <polygon points="80,256 256,232 280,256 256,280" fill="#e94560"/>
  <!-- 中心圆 -->
  <circle cx="256" cy="256" r="20" fill="#e94560"/>
  <circle cx="256" cy="256" r="12" fill="#1a1a2e"/>
  <!-- 文字 N -->
  <text x="256" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#e94560">N</text>
  <!-- 文字 S -->
  <text x="256" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#0f3460">S</text>
  <!-- 文字 E -->
  <text x="490" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#0f3460">E</text>
  <!-- 文字 W -->
  <text x="22" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#e94560">W</text>
</svg>
